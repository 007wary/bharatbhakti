name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.31.1"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('package.json', 'package-lock.json') }}
          restore-keys: |
            gradle-

      - name: Prebuild
        run: npx expo prebuild --platform android

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/bharatbhakti.keystore

      - name: Build signed APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/bharatbhakti.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bharatbhakti-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3
